services:
  postgres:
    image: postgres:16-alpine
    container_name: l3-cdm-postgres
    environment:
      POSTGRES_DB: master_data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d master_data"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
